name: Release to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-release
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: broken-linear

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          npx wrangler pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync Cloudflare runtime secrets
        run: |
          : "${LINEAR_CLIENT_ID:?Missing LINEAR_CLIENT_ID}"
          : "${LINEAR_CLIENT_SECRET:?Missing LINEAR_CLIENT_SECRET}"
          : "${SESSION_SECRET:?Missing SESSION_SECRET}"
          : "${PUBLIC_APP_URL:?Missing PUBLIC_APP_URL}"
          printf '%s' "$LINEAR_CLIENT_ID" | npx wrangler pages secret put LINEAR_CLIENT_ID --project-name "$CLOUDFLARE_PROJECT_NAME"
          printf '%s' "$LINEAR_CLIENT_SECRET" | npx wrangler pages secret put LINEAR_CLIENT_SECRET --project-name "$CLOUDFLARE_PROJECT_NAME"
          printf '%s' "$SESSION_SECRET" | npx wrangler pages secret put SESSION_SECRET --project-name "$CLOUDFLARE_PROJECT_NAME"
          printf '%s' "$PUBLIC_APP_URL" | npx wrangler pages secret put PUBLIC_APP_URL --project-name "$CLOUDFLARE_PROJECT_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}

      - name: Deploy Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
